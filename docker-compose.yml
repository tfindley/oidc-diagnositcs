# Run the pre-built image from GitHub Container Registry.
# Replace the image reference with your actual GHCR path after the first CI build.
#
# Usage:
#   docker compose up
#
# Requires a .env file — copy .env.example and fill in your OIDC provider details.

services:
  oidc-client:
    image: ghcr.io/tfindley/sso_oidc_client_tool:latest
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
